name: Leads Prospector

on:
  workflow_dispatch: # Permite executar manualmente a partir do botão no GitHub
  schedule:
    - cron: '0 8 * * 1' # Exemplo: Corre todas as segundas-feiras às 08:00 (opcional)

jobs:
  run-leads-prospector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Leads Prospector Script
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          LEADS_DB_ID: ${{ secrets.LEADS_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/leads_prospector.py
