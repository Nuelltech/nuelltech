name: Motor Prospector Automático

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  gerar-campanhas:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests anthropic

    - name: Executar Agente Prospector
      env:
        # Mapeamos o nome que o Python espera para o nome do Secret que tu tens
        NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
        INBOX_DB_ID: ${{ secrets.NOTION_DATABASE_ID }}
        CAMPANHAS_DB_ID: ${{ secrets.CAMPANHAS_DB_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python scripts/prospector.py
