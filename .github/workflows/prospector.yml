name: Motor Prospector Automático

on:
  schedule:
    # Agendado para correr todas as segundas-feiras às 07:00 da manhã
    - cron: '0 7 * * 1'
  workflow_dispatch: # Permite-te correr o script manualmente com um botão no GitHub

jobs:
  gerar-campanhas:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests anthropic

    - name: Executar Agente Prospector
      env:
        # As chaves devem ser configuradas nos "Secrets" do teu repositório GitHub
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        INBOX_DB_ID: ${{ secrets.INBOX_DB_ID }}
        CAMPANHAS_DB_ID: ${{ secrets.CAMPANHAS_DB_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python prospector.py
