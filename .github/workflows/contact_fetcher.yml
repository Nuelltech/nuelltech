name: Contact Fetcher - Recolha de Empresas Alvo

on:
  schedule:
    # Corre todas as terças e quintas às 07:00 UTC (08:00/09:00 em Portugal, conforme horário de verão)
    - cron: "0 7 * * 2,4"
  workflow_dispatch: {}   # permite correr manualmente a partir do separador Actions

jobs:
  fetch-contacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install notion-client

      - name: Correr contact_fetcher.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LEADS_DB_ID: ${{ secrets.LEADS_DB_ID }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          MAX_RESULTS_POR_QUERY: "20"
        run: python scripts/contact_fetcher.py
